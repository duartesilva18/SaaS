# Alembic – migrations da base de dados
# Ver: https://alembic.sqlalchemy.org/
# O URL da BD vem de DATABASE_URL (env.py usa app.core.config.settings)

[alembic]
script_location = alembic
prepend_sys_path = .
# URL ignorada em runtime – env.py usa settings.DATABASE_URL do .env
sqlalchemy.url = postgresql://localhost/dummy

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
